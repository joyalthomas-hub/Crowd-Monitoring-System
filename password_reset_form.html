<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SENTRY AI - RESET</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900 p-10 rounded-[2.5rem] border-4 border-slate-800 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter">RESET <span class="text-red-600">KEY</span></h1>
            <p class="text-slate-500 font-mono text-xs uppercase tracking-widest mt-2">Identify Registered Email</p>
        </div>
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Email Address</label>
                <input type="email" name="email" required placeholder="Enter Email"
                    class="w-full bg-black border-2 border-slate-800 rounded-2xl px-5 py-4 focus:border-red-600 outline-none transition-all font-mono text-white">
            </div>
            <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-5 rounded-2xl text-xl transition-all">
                SEND RESET LINK
            </button>
        </form>
    </div>
</body>
</html>
