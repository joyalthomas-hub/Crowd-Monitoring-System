<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SENTRY AI - UPDATE KEY</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 p-10 rounded-[2.5rem] border-4 border-slate-800 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter">SECURE <span class="text-red-600">OVERRIDE</span></h1>
            <p class="text-slate-500 font-mono text-xs uppercase tracking-widest mt-2">Enter New Credentials</p>
        </div>

        {% if validlink %}
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            {% for field in form %}
            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">
                    {{ field.label }}
                </label>
                <input type="password" name="{{ field.html_name }}" required placeholder="••••••••"
                    class="w-full bg-black border-2 border-slate-800 rounded-2xl px-5 py-4 focus:border-red-600 outline-none transition-all font-mono text-white">
                {% if field.errors %}
                    <p class="text-red-500 text-[10px] mt-1 uppercase font-bold">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" 
                class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-5 rounded-2xl text-xl transition-all shadow-lg shadow-red-900/30">
                CONFIRM NEW KEY
            </button>
        </form>
        {% else %}
        <div class="text-center py-10">
            <p class="text-red-500 font-black uppercase text-xl">Access Denied</p>
            <p class="text-slate-500 text-xs mt-2">The security token has expired or is invalid.</p>
            <a href="{% url 'password_reset' %}" class="inline-block mt-6 text-white underline">Request New Token</a>
        </div>
        {% endif %}
    </div>

</body>
</html>
