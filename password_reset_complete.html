<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SENTRY AI - ACCESS RESTORED</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 p-10 rounded-[2.5rem] border-4 border-slate-800 shadow-2xl text-center">
        <div class="w-20 h-20 bg-green-600/20 border-2 border-green-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-[0_0_20px_rgba(34,197,94,0.2)]">
            <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">

        <div class="mb-8">

        </div>

                Your credentials have been re-encrypted in the Sentry database. Use your new password to authorize portal access.
            </p>
        </div>

        <a href="{% url 'login' %}" 
            class="block w-full bg-red-600 hover:bg-red-500 text-white font-black py-5 rounded-2xl text-xl transition-all active:scale-95 shadow-lg shadow-red-900/30">
            PROCEED TO LOGIN
        </a>
    </div>
