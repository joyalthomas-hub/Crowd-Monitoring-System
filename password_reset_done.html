<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SENTRY AI - SENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900 p-10 rounded-[2.5rem] border-4 border-slate-800 shadow-2xl text-center">
        <div class="w-16 h-16 bg-red-600/20 border-2 border-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="text-red-600 text-2xl font-black italic">!</span>
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter mb-4">RESET <span class="text-red-600">SENT</span></h1>
        <p class="text-slate-400 font-mono text-xs uppercase tracking-widest leading-relaxed">
            Transmission complete. Check your system terminal or inbox for the recovery link.
        </p>
        <div class="mt-8 pt-6 border-t border-slate-800">
            <a href="{% url 'login' %}" class="text-slate-500 hover:text-white font-black uppercase text-sm transition-all">
                Return to Login
            </a>
        </div>
    </div>
</body>
</html>
