<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CROWD SENTRY AI - EMERGENCY SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .danger-strobe { animation: strobe 0.15s infinite; }
        @keyframes strobe {
            0% { background-color: #7f1d1d; }
            50% { background-color: #000; }
            100% { background-color: #7f1d1d; }
        }
        .monitor-border { border: 10px solid #1e293b; }
        .danger-border { border: 10px solid #ef4444; animation: pulse-border 0.5s infinite; }
        @keyframes pulse-border {
            0%, 100% { border-color: #ef4444; }
            50% { border-color: #000; }
        }
    </style>
</head>
<body id="bg-screen" class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4 transition-all">

    <div class="max-w-5xl w-full">
        <div id="start-panel" class="text-center p-20 bg-slate-900 rounded-[3rem] border-4 border-slate-800 shadow-2xl">
            <h1 class="text-8xl font-black mb-4 tracking-tighter italic text-white">CROWD <span class="text-red-600">SENTRY</span></h1>
            <p class="text-slate-500 mb-12 text-2xl font-mono uppercase tracking-widest">High-Speed Emergency Alarm Armed</p>
            <button onclick="initSystem()" class="bg-red-600 hover:bg-red-500 text-white px-24 py-12 rounded-3xl text-4xl font-black shadow-2xl transition-all active:scale-95">
                ARM MONITORING
            </button>
        </div>

        <div id="monitor-panel" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <div class="bg-black/60 px-6 py-3 rounded-full border border-white/10 flex items-center gap-4">
                    <div id="status-dot" class="w-4 h-4 bg-green-500 rounded-full"></div>
                    <span id="status-text" class="font-mono text-xl font-bold uppercase tracking-widest">Area Secure</span>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="text-red-500 font-black animate-pulse text-xl">REC ● AUTO-SAVE</div>
                    <a href="{% url 'logout' %}" class="bg-slate-800 hover:bg-red-600 text-white px-6 py-2 rounded-xl font-bold text-sm transition-all border border-slate-700 uppercase tracking-widest">
                        Logout
                    </a>
                </div>
            </div>

            <div id="video-container" class="relative rounded-[3rem] overflow-hidden monitor-border bg-black transition-all">
                <img id="stream" src="" class="w-full h-auto brightness-90">
                <div id="alarm-overlay" class="absolute inset-0 flex items-center justify-center bg-red-600/20 hidden">
                    <h2 class="text-9xl font-black text-white italic drop-shadow-2xl">CROWD!!</h2>
                </div>
            </div>

            <div class="bg-slate-900 p-10 rounded-[3rem] flex justify-between items-center border border-slate-800 shadow-2xl">
                <div class="text-left">
                    <p class="text-slate-500 text-sm font-bold uppercase tracking-widest">Real-Time Count</p>
                    <p id="count" class="text-9xl font-black italic leading-none">0</p>
                </div>
                <div class="flex flex-col gap-3">
                    <button onclick="location.reload()" class="bg-slate-800 text-slate-400 hover:bg-red-600 hover:text-white px-12 py-6 rounded-2xl text-2xl font-black transition-all">RESET FEED</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, mainOsc, mainGain, lfo;
        const startPanel = document.getElementById('start-panel');
        const monitorPanel = document.getElementById('monitor-panel');
        const stream = document.getElementById('stream');
        const countDisplay = document.getElementById('count');
        const bgScreen = document.getElementById('bg-screen');
        const alarmOverlay = document.getElementById('alarm-overlay');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const videoContainer = document.getElementById('video-container');

        function startSiren() {
            if (mainOsc) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainOsc = audioCtx.createOscillator();
            mainGain = audioCtx.createGain();
            lfo = audioCtx.createOscillator();
            let lfoGain = audioCtx.createGain();

            mainOsc.type = 'sawtooth'; 
            mainOsc.frequency.setValueAtTime(500, audioCtx.currentTime);

            lfo.type = 'sine';
            lfo.frequency.setValueAtTime(1.5, audioCtx.currentTime); 
            lfoGain.gain.setValueAtTime(300, audioCtx.currentTime); 

            lfo.connect(lfoGain);
            lfoGain.connect(mainOsc.frequency);

            mainGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            mainOsc.connect(mainGain);
            mainGain.connect(audioCtx.destination);

            lfo.start();
            mainOsc.start();
        }

        function stopSiren() {
            if (mainOsc) {
                mainOsc.stop();
                lfo.stop();
                mainOsc = null;
            }
        }

        async function initSystem() {
            await fetch("{% url 'start_camera' %}");
            startPanel.classList.add('hidden');
            monitorPanel.classList.remove('hidden');
            stream.src = "{% url 'video_feed' %}";
            setInterval(checkCrowd, 600);
        }

        async function checkCrowd() {
            try {
                const res = await fetch("{% url 'get_count' %}");
                const data = await res.json();
                countDisplay.innerText = data.count;

                if (data.count >= 3) {
                    startSiren();
                    bgScreen.classList.add('danger-strobe');
                    videoContainer.classList.add('danger-border');
                    alarmOverlay.classList.remove('hidden');
                    statusText.innerText = "!! CROWD DETECTED !!";
                    statusText.classList.add('text-red-500');
                    statusDot.classList.replace('bg-green-500', 'bg-red-600');
                } else {
                    stopSiren();
                    bgScreen.classList.remove('danger-strobe');
                    videoContainer.classList.remove('danger-border');
                    alarmOverlay.classList.add('hidden');
                    statusText.innerText = "Area Secure";
                    statusText.classList.remove('text-red-500');
                    statusDot.classList.replace('bg-red-600', 'bg-green-500');
                }
            } catch (e) { console.log(e); }
        }
    </script>
</body>
</html>
